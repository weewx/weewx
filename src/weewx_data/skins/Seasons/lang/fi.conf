# Suomessa käytetään metristä järjestelmää (Celsius, m/s, hPa).
# 'metricwx' on suositeltu (käyttää m/s tuulelle km/h sijaan).
unit_system = metricwx

[Units]

    [[Labels]]

        # Yksikkö, Monikko
        meter             = " metri",  " metriä"
        day               = " päivä",    " päivää"
        hour              = " tunti",   " tuntia"
        minute            = " minuutti", " minuuttia"
        second            = " sekunti", " sekuntia"

    [[Ordinates]]

        # Ilmansuunnat. Viimeinen on tyynelle/ei suuntaa.
        directions = P, Pko, Ko, Iko, I, Ika, Ka, Eka, E, Elo, Lo, Llo, L, Llu, Lu, Plu, -

[Labels]

    # Pallonpuoliskot (P=Pohjoinen, E=Etelä, I=Itä, L=Länsi)
    hemispheres = P, E, I, L


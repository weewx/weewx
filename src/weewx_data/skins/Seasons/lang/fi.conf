# Suomessa käytetään metristä järjestelmää.
# "metricwx" käyttää m/s tuulelle, "metric" käyttää km/h.
# Valitse mieltymyksesi mukaan (yleensä m/s on suositumpi).

unit_system = metricwx

[Units]

    [[Labels]]

        # Yksikkö, Monikko
        
        meter             = " metri",  " metriä"
        day               = " päivä",    " päivää"
        hour              = " tunti",   " tuntia"
        minute            = " minuutti", " minuuttia"
        second            = " sekunti", " sekuntia"

    [[Ordinates]]

        # Ilmansuunnat: P, I, E, L ja väli-ilmansuunnat
        
        directions = P, Pko, Ko, Iko, I, Ika, Ka, Eka, E, Elo, Lo, Llo, L, Llu, Lu, Plu, N/A

[Labels]

    # Pallonpuoliskot
    
    hemispheres = P, E, I, L

    # Yleiset sääterminimikkeet
    
    [[Generic]]
        altimeter              = Ilmanpaine (QNH)         # Lentokenttäpaine
        altimeterRate          = Ilmanpaineen muutosnopeus
        appTemp                = Tuntuu kuin
        appTemp1               = Tuntuu kuin
        barometer              = Ilmanpaine               # Merenpinnan tasolla
        barometerRate          = Ilmanpaineen muutosnopeus
        cloudbase              = Pilvien korkeus
        dateTime               = Aika
        dewpoint               = Kastepiste
        ET                     = Haihtuminen
        heatindex              = Lämpöindeksi
        heatingVoltage         = Lämmitysjännite
        humidity               = Kosteus
        inDewpoint             = Sisäkastepiste
        inHumidity             = Sisäkosteus
        inTemp                 = Sisälämpötila
        interval               = Väli
        lightning_distance     = Salaman etäisyys
        lightning_strike_count = Salamoiden määrä
        luminosity             = Valoisuus
        outHumidity            = Ulkokosteus
        outTemp                = Ulkolämpötila
        pressure               = Ilmanpaine (asema)       # Absoluuttinen paine
        radiation              = Säteily
        rain                   = Sade
        rainRate               = Sateen voimakkuus
        rxCheckPercent         = Signaalin laatu
        supplyVoltage          = Syöttöjännite
        UV                     = UV-indeksi
        wind                   = Tuuli
        windchill              = Hyytävyys
        windDir                = Tuulen suunta
        windGust               = Tuulen puuska
        windGustDir            = Puuskan suunta
        windrun                = Tuulen matka
        windSpeed              = Tuulen nopeus

[Almanac]

    # Tähtitieteelliset termit
    
    [[Astro]]
        altitude       = Korkeus
        azimuth        = Atsimuutti
        declination    = Deklinaatio
        equinox        = Päiväntasaus
        phase          = Vaihe
        right_ascension= Rektaskensio
        rise           = Nousu
        set            = Lasku
        solstice       = Päivänseisaus
        total_daylight = Päivän pituus
        transit        = Transiitti (Etelä)
        
        # Twilights, hämärät
        
        civil_begins   = Porvarillinen hämärä alkaa
        civil_ends     = Porvarillinen hämärä päättyy
        nautical_begins= Merenkulullinen hämärä alkaa
        nautical_ends  = Merenkulullinen hämärä päättyy
        astronomical_begins = Tähtitieteellinen hämärä alkaa
        astronomical_ends   = Tähtitieteellinen hämärä päättyy

    # Kuun vaiheet
    
    [[Moon]]
        full           = Täysikuu
        new            = Uusikuu
        waxing_crescent= Kasvava kuun sirppi
        first_quarter  = Ensimmäinen neljännes (puolikuu)
        waxing_gibbous = Kasvava kupera kuu
        last_quarter   = Viimeinen neljännes
        waning_gibbous = Vähenevä kupera kuu
        waning_crescent= Vähenevä kuun sirppi

    # Auringon ja kuun nimikkeet
    
    [[SunMoon]]
        sun            = Aurinko
        moon           = Kuu


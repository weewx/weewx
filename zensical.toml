site_name = 'WeeWX 5.3'
site_url = "https://www.weewx.com"
site_author = "Tom Keffer <tkeffer@gmail.com>"
# Shut off the "edit on GitHub" feature:
edit_uri = ""
copyright = "Copyright © 2009-2026 Thomas Keffer, Matthew Wall, and Gary Roderick, all rights reserved"
docs_dir = "docs_src"
site_dir = "build/docs"

[theme]
name = "zensical"
variant = "classic"
logo = "images/logo-weewx.png"
favicon = "images/favicon.png"
features = [
    "navigation.instant",
    "navigation.tracking",
    "navigation.indexes",
    "navigation.top",
    "toc.follow",
    "search.highlight",
    "search.share",
    "search.suggest",
    "content.tabs.link",
]

[theme.font]
text = "Noto Sans"
code = "Inconsolata Mono"

[[theme.palette]]
scheme = "default"
primary = "teal"
accent = "white"
[theme.palette.toggle]
icon = "material/toggle-switch-off-outline"
name = "Switch to dark mode"

[[theme.palette]]
scheme = "slate"
primary = "white"
accent = "teal"
[theme.palette.toggle]
icon = "material/toggle-switch"
name = "Switch to light mode"

[extra]
generator = false

extra_css = [
    "css/weewx_docs.css",
]

plugins = [
    "search",
]

[markdown]
[markdown.extensions]
pymdownx.highlight = {}
pymdownx.inlinehilite = {}
pymdownx.details = {}
pymdownx.magiclink = {}
pymdownx.mark = {}
pymdownx.tilde = {}
abbr = {}
admonition = {}
attr_list = {}
footnotes = {}
md_in_html = {}
tables = {}

[markdown.extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "python/name:pymdownx.superfences.fence_code_format" }
]

[markdown.extensions.pymdownx.tabbed]
alternate_style = true

[markdown.extensions.pymdownx.snippets]
auto_append = [
    "docs/abbreviations.md",
]

[markdown.extensions.toc]
permalink = true

